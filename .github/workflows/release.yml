name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Publish
        run: >
          dotnet publish src/Grove/Grove.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:Version=${{ inputs.version }}
          -o publish

      - name: Zip artifact
        run: Compress-Archive -Path publish\* -DestinationPath Grove-${{ inputs.version }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Grove v${{ inputs.version }}
          files: Grove-${{ inputs.version }}-win-x64.zip
          generate_release_notes: true
