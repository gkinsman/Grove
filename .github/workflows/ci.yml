name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      # ── Release (only on push to main with a new version) ──

      - name: Read version from csproj
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        shell: pwsh
        run: |
          [xml]$proj = Get-Content src/Grove/Grove.csproj
          $ver = $proj.Project.PropertyGroup.Version
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=v$ver" >> $env:GITHUB_OUTPUT
          echo "::notice::Version from csproj: $ver"

      - name: Check if tag already exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: check
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          $exists = git tag -l $tag
          if ($exists) {
            echo "SKIP=true" >> $env:GITHUB_OUTPUT
            echo "::notice::Tag $tag already exists — no release needed"
          } else {
            echo "SKIP=false" >> $env:GITHUB_OUTPUT
            echo "::notice::New version detected — will release $tag"
          }

      - name: Publish
        if: steps.check.outputs.SKIP == 'false'
        run: >
          dotnet publish src/Grove/Grove.csproj
          -c Release
          -r win-x64
          --self-contained
          -o publish

      - name: Build installer
        if: steps.check.outputs.SKIP == 'false'
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.VERSION }} installer\grove.iss

      - name: Create GitHub Release
        if: steps.check.outputs.SKIP == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Grove ${{ steps.version.outputs.TAG }}
          files: output/Grove-${{ steps.version.outputs.VERSION }}-win-x64-setup.exe
          generate_release_notes: true
